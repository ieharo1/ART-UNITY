services:
  unity-api:
    build: .
    container_name: unity-api
    restart: unless-stopped

  unity-nginx:
    image: nginx:1.27-alpine
    container_name: unity-nginx
    restart: unless-stopped
    depends_on:
      - unity-api
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./webgl:/usr/share/nginx/html:ro
